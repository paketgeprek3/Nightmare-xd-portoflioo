<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MV Portfolio</title>
  <link rel="icon" id="favicon-link" type="image/png" href="data:image/png;base64,iVBORw0KGgo="/>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Shadows+Into+Light&family=Doto:wght@100..900&family=Josefin+Slab:ital,wght@1,250;0,250&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-left">
    <button class="nav-link active" onclick="showPage('works',this)">WORKS</button>
    <button class="nav-link" onclick="showPage('about',this)">ABOUT</button>
  </div>
  <div class="nav-right">
    <div id="e-dot" title=""></div>
    <button id="cp-toggle-btn" onclick="toggleColorPanel()" title="Color settings">🎨 COLORS</button>
    <input id="site-title-input" type="text" value="In-sight by artist"
      title="Site name (admin only)"
      onblur="saveSiteTitle(this.value)"
      onkeydown="if(event.key==='Enter')this.blur()"/>
  </div>
</nav>

<div id="color-panel">
  <div class="cp-title">COLOR THEME <span>● ADMIN</span></div>
  <div class="cp-row">
    <div class="cp-label">Background</div>
    <div class="cp-swatch" style="background:#0a0a0a">
      <input type="color" id="cp-bg" value="#0a0a0a" oninput="applyColor('--bg', this.value); this.parentElement.style.background=this.value"/>
    </div>
  </div>
  <div class="cp-divider"></div>
  <button class="cp-save" onclick="saveColors()">SAVE COLORS</button>
  <button class="cp-reset" onclick="resetColors()">RESET TO DEFAULT</button>
  <button class="cp-save" onclick="saveHeroSettings()" style="margin-top:0.5rem">SAVE HERO SETTINGS</button>
</div>

<div id="page-works" class="page active">
  <section id="hero">
    <div class="hero-rows">
      <div class="hero-strip row1" id="hero-row1"></div>
      <div class="hero-strip row2" id="hero-row2"></div>
      <div class="hero-strip row3" id="hero-row3"></div>
    </div>
    <div class="hero-center">
      <div class="hero-title" id="hero-title-text" spellcheck="false">Nightmare XD</div>
      <div class="hero-subtitle" id="hero-subtitle-text" spellcheck="false">motion designer</div>
      <div class="hero-scroll-hint">▼ &nbsp; SCROLL TO EXPLORE</div>
    </div>
  </section>
  <div id="hero-spacer"></div>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-tag active" data-tag="ALL" onclick="filterTag(this)">ALL</button>
    <div class="filter-sep"></div>
  </div>
  <div id="reorder-banner">⠿ DRAG THUMBNAILS TO REORDER <span>CHANGES SAVED AUTOMATICALLY</span></div>
  <div class="grid-wrap" style="padding-top:3px">
    <div class="masonry-grid" id="masonry-grid">
      <div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>
</div>

<div id="page-about" class="page">
  <div id="about-name" contenteditable="true" onblur="saveAbout()" spellcheck="false">ARTIST NAME</div>
  <div id="about-role" contenteditable="true" onblur="saveAbout()" spellcheck="false">MUSIC VIDEO DIRECTOR</div>
  <div id="about-body" contenteditable="true" onblur="saveAbout()" spellcheck="false">Your bio goes here.</div>
  <div class="about-hint">↑ CLICK ANY TEXT TO EDIT &nbsp;·&nbsp; USE THE SAME SHORTCUT TO EXIT</div>
</div>

<button id="edit-fab" onclick="openAddModal()" title="Add video">+</button>

<div id="fm-bg">
  <div class="pw-box">
    <div class="pw-title">ADMIN ACCESS</div>
    <div class="pw-wrap">
      <input id="pw-input" type="password" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')_chk()"/>
      <button class="pw-eye" onclick="toggleEye()">👁</button>
    </div>
    <div id="pw-err"></div>
    <div class="pw-actions">
      <button class="btn btn-ghost" onclick="_closePw()">CANCEL</button>
      <button class="btn btn-primary" onclick="_chk()">ENTER</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="bgCloseModal(event)">
  </div>

<div id="lightbox-bg">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div class="lb-frame"><iframe id="lb-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>
  </div>

<div id="ctx-menu">
  <button class="ctx-item ctx-adm" onclick="ctxEdit()">✏ Edit</button>
  <button class="ctx-item" onclick="ctxYT()">▶ Open in YouTube</button>
  <button class="ctx-item ctx-adm danger" onclick="ctxDel()">✕ Delete</button>
</div>

<button id="save-order-btn" onclick="saveOrder()">✓ SAVE ORDER</button>
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
